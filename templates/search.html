<html>

<head>
	<title>Search - FoodApp</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
	<link rel="stylesheet" href="assets/css/main.css" />
	<link rel="stylesheet" href="assets/css/navbar.css" />
	<noscript>
		<link rel="stylesheet" href="assets/css/noscript.css" />
	</noscript>
	<!--font for search bar-->
	<style>
		input[type="search"] {
			font-family: "Arial", sans-serif;
			color: #000;
			padding: 10px;
		}
	</style>
</head>

<body class="is-preload">

	<!-- Header -->
	<header id="header">
		<a href="index.html" class="title">FoodApp</a>
		<nav>
            <ul>
                <li><a href="/favorites">Favorites</a></li>
                <li><a href="/about">About</a></li>

                {% if current_user.is_authenticated %}

                <li><a href="/stats">Stats</a></li>
                <li><a href="/logout" class="button primary small signin-btn">Logout</a></li>

                {% else %}
                <li><a href="/login" class="button primary small signin-btn">Sign In</a></li>
                {% endif %}
            </ul>
		</nav>
	</header>
	<!-- Wrapper -->
		</section>
		<!-- Main -->
		<section id="main" class="wrapper">
			<div class="inner">
				<h1 class="major">Search</h1>
				<!--Search Bar -->
				<form action="/search" method="get">
					<input type="search" name="q" placeholder="Search..." aria-label="Search through site content">
					<button type="submit">Search</button>
				</form>
			</div>
		</section>

	</div>

	


	<!-- Footer -->
	<footer id="footer" class="wrapper alt">
		<div class="inner">
			<ul class="menu">
				<li>&copy; FoodApp. CS122 Final Project.</li>
				<li>Design: <a href="http://html5up.net">HTML5 UP</a></li>
			</ul>
		</div>
	</footer>

	<!-- Scripts -->
	<script src="assets/js/jquery.min.js"></script>
	<script src="assets/js/jquery.scrollex.min.js"></script>
	<script src="assets/js/jquery.scrolly.min.js"></script>
	<script src="assets/js/browser.min.js"></script>
	<script src="assets/js/breakpoints.min.js"></script>
	<script src="assets/js/util.js"></script>
	<script src="assets/js/main.js"></script>

</body>

</html>
