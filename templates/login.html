				<!-- Main -->

						<div class="inner">
							<div class="auth-wrapper">
								<div class="auth-card">
									<h1>Welcome back</h1>
									<p class="subtitle">Sign in to save favorite recipes and track your meal history.</p>

									<div id="auth-banner" class="auth-banner" role="status" aria-live="polite"></div>

									<form id="login-form" action="/login" method="post" novalidate>
										<div class="field">
											<label for="username">Username or Email</label>
											<input type="text" name="username" id="username" autocomplete="username" required />
										</div>
										<div class="field">
											<label for="password">Password</label>
											<div class="password-wrap">
												<input type="password" name="password" id="password" autocomplete="current-password" required />
												<button type="button" class="toggle-pw" data-target="password" aria-label="Show password">Show</button>
											</div>
										</div>
										<div class="remember-row">
											<label><input type="checkbox" name="remember" id="remember" /> Remember me</label>
											<a href="#">Forgot password?</a>
										</div>
										<ul class="actions">
											<li><button type="submit" class="button primary">Sign In</button></li>
										</ul>
									</form>

									<div class="auth-footer">
										<p>Don't have an account? <a href="signup.html">Create one</a></p>
									</div>
								</div>

			<script>
				// Password visibility toggles
				document.querySelectorAll('.toggle-pw').forEach(function(btn) {
					btn.addEventListener('click', function() {
						var input = document.getElementById(btn.dataset.target);
						if (!input) return;
						var showing = input.type === 'text';
						input.type = showing ? 'password' : 'text';
						btn.textContent = showing ? 'Show' : 'Hide';
						btn.setAttribute('aria-label', (showing ? 'Show' : 'Hide') + ' password');
					});
				});

				// Intercept submit -- auth backend is not yet wired up
				var form = document.getElementById('login-form');
				var banner = document.getElementById('auth-banner');
				form.addEventListener('submit', function(e) {
					e.preventDefault();
					var user = document.getElementById('username').value.trim();
					var pass = document.getElementById('password').value;
					if (!user || !pass) {
						banner.className = 'auth-banner show error';
						banner.textContent = 'Please enter both a username/email and a password.';
						return;
					}
					banner.className = 'auth-banner show success';
					banner.textContent = 'Signed in as ' + user + '. (Auth backend not yet wired up.)';
				});
			</script>
